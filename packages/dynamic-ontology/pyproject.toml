[project]
name = "dynamic-ontology"
version = "0.1.0"
description = "動的オントロジーエンジン - スキーマ定義をデータとして管理"
requires-python = ">=3.14"
dependencies = [
    "fastapi>=0.115.0",
    "sqlalchemy>=2.0.36",
    "psycopg[binary]>=3.2.3",
    "pydantic>=2.10.0",
    "alembic>=1.14.0",
    "greenlet>=3.3.1",
]

[dependency-groups]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "httpx>=0.28.0",
    "ruff>=0.8.0",
    "mypy>=1.13.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dynamic_ontology"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
target-version = "py313"
line-length = 120
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "ANN", "S", "B"]
ignore = ["S101"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["ANN", "S"]
"src/dynamic_ontology/adapters/persistence/**" = ["S608", "ANN401"]
"src/dynamic_ontology/domain/services/**" = ["ANN401", "S608"]
"src/dynamic_ontology/domain/validators/**" = ["ANN401"]
"src/dynamic_ontology/domain/exceptions.py" = ["N818"]

[tool.mypy]
python_version = "3.14"
strict = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = "dynamic_ontology.domain.services.query_builder"
warn_return_any = false

[[tool.mypy.overrides]]
module = "dynamic_ontology.adapters.api.dependencies"
warn_return_any = false
