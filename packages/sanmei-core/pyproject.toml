[project]
name = "sanmei-core"
version = "0.1.0"
description = "算命学コアロジック - 純粋計算ライブラリ"
requires-python = ">=3.14"
dependencies = [
    "pydantic>=2.10.0",
]

[dependency-groups]
dev = [
    "pytest>=8.3.0",
    "pytest-cov>=6.0.0",
    "ruff>=0.8.0",
    "mypy>=1.13.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sanmei_core"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
